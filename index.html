<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    :root {
      color-scheme: light;
      --canvas-light: #ffffff;
      --canvas-cream: #f2f0eb;
      --surface: #ffffff;
      --ink: rgba(0, 0, 0, 0.87);
      --text: rgba(0, 0, 0, 0.87);
      --muted: rgba(0, 0, 0, 0.58);
      --shade-30: #d4d4d8;
      --hairline-light: #e4e4e7;
      --brand-green: #00754a;
      --brand-green-light: #d4e9e2;
      --shadow-card: 0 0 0.5px rgba(0, 0, 0, 0.14), 0 1px 1px rgba(0, 0, 0, 0.24);
      --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.14);
      --radius-sm: 8px;
      --radius-lg: 12px;
      --radius-pill: 9999px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-feature-settings: "ss03";
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter Variable", Inter, "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--canvas-cream);
      color: var(--text);
      padding: 18px;
    }

    .app {
      width: min(100%, 1200px);
      margin: 0 auto;
    }

    .shell {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(228, 228, 231, 0.9);
      border-radius: 20px;
      box-shadow: var(--shadow-float);
      padding: 18px;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tab-btn {
      appearance: none;
      border: 1px solid var(--hairline-light);
      background: var(--canvas-light);
      color: var(--ink);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .tab-btn:hover {
      transform: translateY(-1px);
    }

    .tab-btn.active {
      background: var(--brand-green);
      color: #ffffff;
      border-color: var(--brand-green);
    }

    .category-panel {
      background: var(--surface);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-card);
    }

    .owner-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .owner-panel {
      background: var(--surface);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 12px;
    }

    .owner-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .owner-name {
      margin: 0;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      color: var(--ink);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
      background: var(--canvas-light);
      color: var(--ink);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 0 0 1px rgba(124, 124, 124, 0.06);
    }

    input:focus {
      border-color: var(--brand-green);
      box-shadow: 0 0 0 1px var(--brand-green);
    }

    .add-btn {
      appearance: none;
      border: 0;
      padding: 9px 14px;
      border-radius: var(--radius-pill);
      background: var(--brand-green);
      color: #ffffff;
      font-size: 13px;
      font-weight: 550;
      line-height: 1.5;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      background: #1db954;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--canvas-light);
      border: 1px solid var(--hairline-light);
    }

    li.done {
      opacity: 0.65;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    li.done .item-body {
      opacity: 0.7;
    }

    .item-text {
      min-width: 0;
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink);
      word-break: break-word;
    }

    .item-link {
      color: var(--brand-green);
      text-decoration: underline;
      word-break: break-all;
    }

    .item-link:hover {
      color: #0a6f44;
    }

    .link-card {
      display: block;
      border: 1px solid rgba(0, 117, 74, 0.18);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(212, 233, 226, 0.45), rgba(255, 255, 255, 0.96));
      padding: 12px 14px;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .link-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.1);
      border-color: rgba(0, 117, 74, 0.28);
    }

    .link-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .link-card-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 9999px;
      background: var(--brand-green);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .link-card-domain {
      min-width: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-card-url {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .item-body {
      min-width: 0;
      flex: 1;
      display: grid;
      gap: 8px;
    }

    .item-link-layout {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 8px;
      align-items: start;
    }

    .item-main {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .item-photo {
      display: block;
      width: 100%;
      max-width: 220px;
      border-radius: 12px;
      object-fit: cover;
      aspect-ratio: 4 / 3;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .item-note {
      margin: 0;
      min-width: 0;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      background: #fafaf7;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .photo-picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .photo-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 12px;
      border-radius: var(--radius-pill);
      background: #f1f5f4;
      border: 1px solid var(--hairline-light);
      color: var(--ink);
      font-size: 13px;
      font-weight: 550;
      cursor: pointer;
      flex-shrink: 0;
    }

    .photo-label input {
      display: none;
    }

    .photo-picker input[type="file"] {
      display: none;
    }

    .photo-name {
      min-width: 0;
      max-width: 150px;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .mini {
      appearance: none;
      border: 0;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.49;
      white-space: nowrap;
      cursor: pointer;
    }

    .check {
      background: var(--brand-green-light);
      color: var(--ink);
    }

    .remove {
      background: #eeeeee;
      color: var(--ink);
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.49;
    }

    .footer strong {
      color: var(--ink);
      font-weight: 550;
    }

    .hint {
      max-width: 70ch;
    }

    @media (max-width: 960px) {
      .owner-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .shell {
        padding: 14px;
        border-radius: 16px;
      }

      .category-panel {
        padding: 14px;
      }

      .input-row {
        flex-direction: column;
      }

      .meta-row {
        flex-direction: column;
        align-items: stretch;
      }

      .item-body-link {
        grid-template-columns: 1fr;
      }

      .item-link-layout {
        grid-template-columns: 1fr;
      }

      .item-photo {
        max-width: 100%;
      }

      .photo-picker {
        width: 100%;
        justify-content: space-between;
      }

      .photo-name {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <div class="category-tabs" id="categoryTabs"></div>
      <section class="category-panel" id="categoryPanel"></section>
      <div class="footer">
        <div class="hint"><strong>정훈</strong>과 <strong>시현</strong>의 목록은 카테고리별로 따로 저장됩니다.</div>
        <div id="status">준비 완료</div>
      </div>
    </section>
  </main>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const STORAGE_KEY = "shopping-list-items";
    const ACTIVE_CATEGORY_KEY = "shopping-list-active-category";
    const LEGACY_STORAGE_KEY = "shopping-list-categories";
    const SUPABASE_URL = window.__SUPABASE_URL__ || "";
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || "";
    const TABLE_NAME = "shopping_items";
    const PHOTO_BUCKET = "shopping-item-photos";
    const REMOTE_ENABLED = Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);

    const owners = [
      { id: "junghun", name: "정훈" },
      { id: "siyeon", name: "시현" }
    ];

    const categories = [
      { id: "food", title: "음식" },
      { id: "cosmetics", title: "화장품" },
      { id: "clothing", title: "의류" },
      { id: "etc", title: "기타" }
    ];

    const categoryTabs = document.getElementById("categoryTabs");
    const categoryPanel = document.getElementById("categoryPanel");
    const status = document.getElementById("status");
    const supabase = REMOTE_ENABLED ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    let items = [];
    let activeCategory = loadActiveCategory();
    let realtimeChannel = null;
    let syncTimer = null;

    function loadActiveCategory() {
      const saved = localStorage.getItem(ACTIVE_CATEGORY_KEY);
      return categories.some((category) => category.id === saved) ? saved : categories[0].id;
    }

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }

      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function linkifyHtml(text) {
      const source = String(text);
      const urlPattern = /(https?:\/\/[^\s<]+|www\.[^\s<]+)/gi;
      let result = "";
      let lastIndex = 0;

      for (const match of source.matchAll(urlPattern)) {
        const raw = match[0];
        const index = match.index ?? 0;

        result += escapeHtml(source.slice(lastIndex, index));

        let href = raw;
        let display = raw;
        let trailing = "";

        while (/[),.!?;:]$/.test(display)) {
          trailing = display.slice(-1) + trailing;
          display = display.slice(0, -1);
        }

        if (display.startsWith("www.")) {
          href = `https://${display}`;
        } else {
          href = display;
        }

        result += `<a class="item-link" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(display)}</a>${escapeHtml(trailing)}`;
        lastIndex = index + raw.length;
      }

      result += escapeHtml(source.slice(lastIndex));
      return result;
    }

    function trimTrailingPunctuation(value) {
      let text = String(value).trim();

      while (/[),.!?;:]$/.test(text)) {
        text = text.slice(0, -1);
      }

      return text;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function sanitizeFileName(name) {
      return String(name || "photo").replace(/[^a-zA-Z0-9._-]+/g, "_").slice(0, 80);
    }

    async function preparePhotoAttachment(file, categoryId, ownerId) {
      if (!file) {
        return { photo_url: "", photo_path: "" };
      }

      if (!REMOTE_ENABLED) {
        return { photo_url: await fileToDataUrl(file), photo_path: "" };
      }

      const safeName = sanitizeFileName(file.name);
      const photoPath = `${categoryId}/${ownerId}/${makeId()}-${safeName}`;
      const { error: uploadError } = await supabase.storage
        .from(PHOTO_BUCKET)
        .upload(photoPath, file, {
          contentType: file.type || "application/octet-stream",
          upsert: false
        });

      if (uploadError) {
        throw uploadError;
      }

      const { data } = supabase.storage.from(PHOTO_BUCKET).getPublicUrl(photoPath);
      return { photo_url: data.publicUrl, photo_path: photoPath };
    }

    function extractSingleUrl(text) {
      const source = String(text).trim();
      const matched = source.match(/^(https?:\/\/[^\s<]+|www\.[^\s<]+)$/i);
      if (!matched) {
        return null;
      }

      const cleaned = trimTrailingPunctuation(matched[1]);
      const href = cleaned.startsWith("www.") ? `https://${cleaned}` : cleaned;

      try {
        return new URL(href);
      } catch {
        return null;
      }
    }

    function renderItemContent(text) {
      return renderShoppingItem({
        text,
        note: "",
        photo_url: "",
        photo_path: ""
      });
    }

    function renderShoppingItem(item) {
      const text = String(item.text);
      const note = String(item.note || "").trim();
      const url = extractSingleUrl(text);
      const photo = item.photo_url
        ? `<img class="item-photo" src="${escapeHtml(item.photo_url)}" alt="attached photo" loading="lazy" />`
        : "";

      if (url) {
        const domain = url.hostname.replace(/^www\./, "");
        const label = domain.includes("google.com") && url.pathname.includes("/maps") ? "map" : "link";
        const noteMarkup = note ? `<div class="item-note">${escapeHtml(note)}</div>` : "";

        return `
          <div class="item-body">
            ${photo}
            <div class="item-link-layout">
              <a class="link-card" href="${escapeHtml(url.toString())}" target="_blank" rel="noopener noreferrer">
                <div class="link-card-top">
                  <span class="link-card-badge">${escapeHtml(label)}</span>
                  <span class="link-card-domain">${escapeHtml(domain)}</span>
                </div>
                <p class="link-card-url">${escapeHtml(url.toString())}</p>
              </a>
              ${noteMarkup}
            </div>
          </div>
        `;
      }

      const noteMarkup = note ? `<div class="item-note">${escapeHtml(note)}</div>` : "";

      return `
        <div class="item-body">
          ${photo}
          <div class="item-main">
            <span class="item-text">${linkifyHtml(text)}</span>
            ${noteMarkup}
          </div>
        </div>
      `;
    }

    function normalizeItem(item, fallbackCategoryId = "", fallbackOwnerId = "") {
      const categoryId = item.category_id || item.categoryId || fallbackCategoryId;
      const ownerId = item.owner_id || item.ownerId || fallbackOwnerId;

      if (!categoryId || !ownerId || !item.text) {
        return null;
      }

      return {
        id: item.id || makeId(),
        category_id: categoryId,
        owner_id: ownerId,
        text: String(item.text),
        note: String(item.note ?? ""),
        photo_url: String(item.photo_url ?? ""),
        photo_path: String(item.photo_path ?? ""),
        done: Boolean(item.done),
        created_at: item.created_at || new Date().toISOString()
      };
    }

    function normalizeItems(value) {
      if (!Array.isArray(value)) {
        return [];
      }

      return value
        .map((item) => normalizeItem(item, item.category_id, item.owner_id))
        .filter(Boolean);
    }

    function loadLocalItems() {
      try {
        const primary = localStorage.getItem(STORAGE_KEY);
        const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
        const raw = primary || legacy;

        if (!raw) return [];

        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          return normalizeItems(parsed);
        }

        if (parsed && typeof parsed === "object") {
          return Object.entries(parsed).flatMap(([categoryId, categoryItems]) => {
            if (!Array.isArray(categoryItems)) return [];

            return categoryItems
              .map((item) => normalizeItem(item, categoryId, item.owner || item.owner_id))
              .filter(Boolean);
          });
        }
      } catch {
        return [];
      }

      return [];
    }

    function saveLocalItems(nextItems) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nextItems));
    }

    function getCategoryItems(categoryId) {
      return items.filter((item) => item.category_id === categoryId);
    }

    function getOwnerItems(categoryId, ownerId) {
      return items.filter((item) => item.category_id === categoryId && item.owner_id === ownerId);
    }

    function setStatus(message) {
      status.textContent = message;
    }

    function renderTabs() {
      categoryTabs.innerHTML = categories
        .map(
          (category) => `
            <button class="tab-btn ${category.id === activeCategory ? "active" : ""}" data-category="${category.id}">
              ${category.title}
            </button>
          `
        )
        .join("");

      categoryTabs.querySelectorAll("[data-category]").forEach((button) => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          localStorage.setItem(ACTIVE_CATEGORY_KEY, activeCategory);
          setStatus("카테고리가 전환되었습니다");
          render();
        });
      });
    }

    function renderPanel() {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];

      categoryPanel.innerHTML = `
        <div class="owner-grid">
          ${owners
            .map((owner) => {
              const ownerItems = getOwnerItems(category.id, owner.id);

              return `
                <div class="owner-panel">
                  <div class="owner-head">
                    <span class="owner-name">${owner.name}</span>
                  </div>
                  <div class="input-row">
                    <input type="text" id="input-${category.id}-${owner.id}" placeholder="${owner.name} ${category.title} 추가" />
                    <button class="add-btn" type="button" data-add="${category.id}" data-owner="${owner.id}">추가</button>
                  </div>
                  <div class="meta-row">
                    <input type="text" id="note-${category.id}-${owner.id}" placeholder="메모(선택)" />
                    <div class="photo-picker">
                      <label class="photo-label" for="photo-${category.id}-${owner.id}">사진</label>
                      <input type="file" id="photo-${category.id}-${owner.id}" accept="image/*" />
                      <span class="photo-name" id="photo-name-${category.id}-${owner.id}">선택 안 됨</span>
                    </div>
                  </div>
                  <ul id="list-${category.id}-${owner.id}">
                    ${
                      ownerItems.length
                        ? ownerItems
                            .map(
                              (item) => `
                              <li class="${item.done ? "done" : ""}">
                                  ${renderShoppingItem(item)}
                                  <div class="item-actions">
                                    <button class="mini check" type="button" data-toggle="${item.id}">
                                      ${item.done ? "취소" : "완료"}
                                    </button>
                                    <button class="mini remove" type="button" data-remove="${item.id}">
                                      삭제
                                    </button>
                                  </div>
                                </li>
                              `
                            )
                            .join("")
                        : `<li style="justify-content:center; color: var(--muted);">아직 항목이 없어요</li>`
                    }
                  </ul>
                </div>
              `;
            })
            .join("")}
        </div>
      `;
    }

    function render() {
      renderTabs();
      renderPanel();
      bindEvents();
    }

    function loadFromStorageAsFallback() {
      items = loadLocalItems();
      render();
    }

    async function refreshFromSupabase() {
      if (!REMOTE_ENABLED) {
        loadFromStorageAsFallback();
        return;
      }

      const { data, error } = await supabase
        .from(TABLE_NAME)
        .select("id, category_id, owner_id, text, note, photo_url, photo_path, done, created_at")
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        setStatus("Supabase load failed");
        loadFromStorageAsFallback();
        return;
      }

      items = normalizeItems(data);
      render();
      setStatus("Synced");
    }

    async function toggleItem(itemId) {
      const currentItem = items.find((item) => item.id === itemId);
      if (!currentItem) return;

      if (REMOTE_ENABLED) {
        const { error } = await supabase
          .from(TABLE_NAME)
          .update({ done: !currentItem.done })
          .eq("id", itemId);

        if (error) {
          console.error(error);
          setStatus("Status update failed");
          return;
        }

        await refreshFromSupabase();
        return;
      }

      items = items.map((item) => (item.id === itemId ? { ...item, done: !item.done } : item));
      saveLocalItems(items);
      setStatus("Status updated");
      render();
    }

    async function addShoppingItem(categoryId, ownerId) {
      const input = document.getElementById(`input-${categoryId}-${ownerId}`);
      const noteInput = document.getElementById(`note-${categoryId}-${ownerId}`);
      const photoInput = document.getElementById(`photo-${categoryId}-${ownerId}`);
      const photoName = document.getElementById(`photo-name-${categoryId}-${ownerId}`);
      const text = input ? input.value.trim() : "";
      const note = noteInput ? noteInput.value.trim() : "";
      const file = photoInput && photoInput.files ? photoInput.files[0] : null;

      if (!text) return;

      try {
        const attachment = file ? await preparePhotoAttachment(file, categoryId, ownerId) : { photo_url: "", photo_path: "" };

        if (REMOTE_ENABLED) {
          const newItem = {
            category_id: categoryId,
            owner_id: ownerId,
            text,
            note,
            photo_url: attachment.photo_url,
            photo_path: attachment.photo_path,
            done: false
          };

          const { error } = await supabase.from(TABLE_NAME).insert(newItem);

          if (error) {
            throw error;
          }

          if (input) input.value = "";
          if (noteInput) noteInput.value = "";
          if (photoInput) photoInput.value = "";
          if (photoName) photoName.textContent = "No file selected";

          await refreshFromSupabase();
          return;
        }

        items = [
          ...items,
          {
            id: makeId(),
            category_id: categoryId,
            owner_id: ownerId,
            text,
            note,
            photo_url: attachment.photo_url,
            photo_path: attachment.photo_path,
            done: false,
            created_at: new Date().toISOString()
          }
        ];

        saveLocalItems(items);
        if (input) input.value = "";
        if (noteInput) noteInput.value = "";
        if (photoInput) photoInput.value = "";
        if (photoName) photoName.textContent = "No file selected";
        setStatus("Item added");
        render();
      } catch (error) {
        console.error(error);
        setStatus("Photo upload or add failed");
      }
    }

    async function removeShoppingItem(itemId) {
      const currentItem = items.find((item) => item.id === itemId);
      if (!currentItem) return;

      if (REMOTE_ENABLED) {
        if (currentItem.photo_path) {
          const { error: storageError } = await supabase.storage.from(PHOTO_BUCKET).remove([currentItem.photo_path]);
          if (storageError) {
            console.error(storageError);
          }
        }

        const { error } = await supabase.from(TABLE_NAME).delete().eq("id", itemId);

        if (error) {
          console.error(error);
          setStatus("Delete failed");
          return;
        }

        await refreshFromSupabase();
        return;
      }

      items = items.filter((item) => item.id !== itemId);
      saveLocalItems(items);
      setStatus("Item deleted");
      render();
    }

    function bindEvents() {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];

      owners.forEach((owner) => {
        const input = document.getElementById(`input-${category.id}-${owner.id}`);
        const noteInput = document.getElementById(`note-${category.id}-${owner.id}`);
        const photoInput = document.getElementById(`photo-${category.id}-${owner.id}`);
        const photoName = document.getElementById(`photo-name-${category.id}-${owner.id}`);
        const addButton = categoryPanel.querySelector(`[data-add="${category.id}"][data-owner="${owner.id}"]`);

        if (input) {
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              void addShoppingItem(category.id, owner.id);
            }
          });
        }

        if (noteInput) {
          noteInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              void addShoppingItem(category.id, owner.id);
            }
          });
        }

        if (photoInput && photoName) {
          photoInput.addEventListener("change", () => {
            const file = photoInput.files && photoInput.files[0];
            photoName.textContent = file ? file.name : "No file selected";
          });
        }

        if (addButton) {
          addButton.addEventListener("click", () => {
            void addShoppingItem(category.id, owner.id);
          });
        }
      });

      if (!bindEvents.delegatedClicksBound) {
        categoryPanel.addEventListener("click", (event) => {
          const toggleButton = event.target.closest("[data-toggle]");
          if (toggleButton && categoryPanel.contains(toggleButton)) {
            void toggleItem(toggleButton.dataset.toggle);
            return;
          }

          const removeButton = event.target.closest("[data-remove]");
          if (removeButton && categoryPanel.contains(removeButton)) {
            void removeShoppingItem(removeButton.dataset.remove);
          }
        });

        bindEvents.delegatedClicksBound = true;
      }
    }

    function startRealtime() {
      if (!REMOTE_ENABLED) return;

      realtimeChannel = supabase
        .channel("shopping-items-changes")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: TABLE_NAME },
          () => {
            void refreshFromSupabase();
          }
        )
        .subscribe((state, err) => {
          if (state === "SUBSCRIBED") {
            setStatus("Supabase connected");
          }

          if (state === "CHANNEL_ERROR" || state === "TIMED_OUT") {
            console.error(state, err);
          }
        });

      syncTimer = window.setInterval(() => {
        void refreshFromSupabase();
      }, 5000);
    }

    async function init() {
      if (REMOTE_ENABLED) {
        await refreshFromSupabase();
        startRealtime();
      } else {
        loadFromStorageAsFallback();
        setStatus("Local mode");
      }
    }

    window.addEventListener("beforeunload", () => {
      if (realtimeChannel) {
        supabase.removeChannel(realtimeChannel);
      }

      if (syncTimer) {
        window.clearInterval(syncTimer);
      }
    });

    init();
  </script>
</body>
</html>
