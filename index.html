<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      color-scheme: light;
      --canvas-light: #ffffff;
      --canvas-cream: #fbfbf5;
      --ink: #000000;
      --text: #111111;
      --muted: #52525b;
      --shade-30: #d4d4d8;
      --hairline-light: #e4e4e7;
      --aloe-10: #c1fbd4;
      --pistachio-10: #d4f9e0;
      --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.06), 0 5px 10px rgba(0, 0, 0, 0.08);
      --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.14);
      --radius-sm: 8px;
      --radius-lg: 12px;
      --radius-pill: 9999px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-feature-settings: "ss03";
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter Variable", Inter, "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(196, 251, 212, 0.75) 0%, transparent 26%),
        radial-gradient(circle at bottom right, rgba(212, 249, 224, 0.8) 0%, transparent 30%),
        linear-gradient(180deg, var(--canvas-cream) 0%, #ffffff 100%);
      color: var(--text);
      padding: 24px;
    }

    .app {
      width: min(100%, 1200px);
      margin: 0 auto;
    }

    .shell {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(228, 228, 231, 0.95);
      border-radius: 20px;
      box-shadow: var(--shadow-float);
      padding: 24px;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tab-btn {
      border: 1px solid var(--hairline-light);
      background: var(--canvas-light);
      color: var(--ink);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: var(--shadow-card);
    }

    .tab-btn:hover {
      transform: translateY(-1px);
    }

    .tab-btn.active {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
    }

    .category-panel {
      background: var(--surface, #ffffff);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-card);
    }

    .owner-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .owner-panel {
      background: var(--canvas-cream);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 14px;
    }

    .owner-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .owner-name {
      margin: 0;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      color: var(--ink);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font: inherit;
      font-size: 16px;
      line-height: 1.5;
      background: var(--canvas-light);
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: #000000;
      box-shadow: 0 0 0 1px #000000;
    }

    .add-btn {
      appearance: none;
      border: 0;
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      background: #000000;
      color: #ffffff;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      background: #3f3f46;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--canvas-light);
      border: 1px solid var(--hairline-light);
    }

    li.done {
      opacity: 0.65;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .item-text {
      min-width: 0;
      flex: 1;
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink);
      word-break: break-word;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .mini {
      appearance: none;
      border: 0;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.49;
      white-space: nowrap;
      cursor: pointer;
    }

    .check {
      background: var(--aloe-10);
      color: var(--ink);
    }

    .remove {
      background: var(--shade-30);
      color: var(--ink);
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.49;
    }

    .footer strong {
      color: var(--ink);
      font-weight: 550;
    }

    .hint {
      max-width: 70ch;
    }

    @media (max-width: 960px) {
      .owner-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .shell {
        padding: 18px;
        border-radius: 16px;
      }

      .category-panel {
        padding: 18px;
      }

      .input-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <div class="category-tabs" id="categoryTabs"></div>
      <section class="category-panel" id="categoryPanel"></section>
      <div class="footer">
        <div class="hint"><strong>정훈</strong>과 <strong>시현</strong>의 목록은 카테고리별로 따로 저장됩니다.</div>
        <div id="status">준비 완료</div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "shopping-list-categories";
    const ACTIVE_CATEGORY_KEY = "shopping-list-active-category";
    const owners = [
      { id: "junghun", name: "정훈" },
      { id: "siyeon", name: "시현" }
    ];
    const categories = [
      { id: "food", title: "음식" },
      { id: "cosmetics", title: "화장품" },
      { id: "clothing", title: "의류" },
      { id: "etc", title: "기타" }
    ];

    const categoryTabs = document.getElementById("categoryTabs");
    const categoryPanel = document.getElementById("categoryPanel");
    const status = document.getElementById("status");
    const defaultData = Object.fromEntries(categories.map((category) => [category.id, []]));

    function cloneDefaultData() {
      return JSON.parse(JSON.stringify(defaultData));
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return cloneDefaultData();
        const parsed = JSON.parse(raw);
        return { ...cloneDefaultData(), ...parsed };
      } catch {
        return cloneDefaultData();
      }
    }

    function loadActiveCategory() {
      const saved = localStorage.getItem(ACTIVE_CATEGORY_KEY);
      return categories.some((category) => category.id === saved) ? saved : categories[0].id;
    }

    let data = loadData();
    let activeCategory = loadActiveCategory();

    function saveData(message = "저장됨") {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem(ACTIVE_CATEGORY_KEY, activeCategory);
      status.textContent = message;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function groupedItems(items, ownerId) {
      return items.filter((item) => item.owner === ownerId);
    }

    function renderTabs() {
      categoryTabs.innerHTML = categories.map((category) => `
        <button class="tab-btn ${category.id === activeCategory ? "active" : ""}" data-category="${category.id}">
          ${category.title}
        </button>
      `).join("");

      categoryTabs.querySelectorAll("[data-category]").forEach((button) => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          saveData("카테고리가 전환되었습니다");
          render();
        });
      });
    }

    function renderPanel() {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];
      const items = data[category.id] || [];

      categoryPanel.innerHTML = `
        <div class="owner-grid">
          ${owners.map((owner) => {
            const ownerItems = groupedItems(items, owner.id);
            return `
              <div class="owner-panel">
                <div class="owner-head">
                  <span class="owner-name">${owner.name}</span>
                </div>
                <div class="input-row">
                  <input type="text" id="input-${category.id}-${owner.id}" placeholder="${owner.name} ${category.title} 추가" />
                  <button class="add-btn" data-add="${category.id}" data-owner="${owner.id}">추가</button>
                </div>
                <ul id="list-${category.id}-${owner.id}">
                  ${
                    ownerItems.length
                      ? ownerItems.map((item, index) => `
                          <li class="${item.done ? "done" : ""}">
                            <span class="item-text">${escapeHtml(item.text)}</span>
                            <div class="item-actions">
                              <button class="mini check" data-toggle="${category.id}" data-owner="${owner.id}" data-index="${index}">
                                ${item.done ? "취소" : "완료"}
                              </button>
                              <button class="mini remove" data-remove="${category.id}" data-owner="${owner.id}" data-index="${index}">
                                삭제
                              </button>
                            </div>
                          </li>
                        `).join("")
                      : `<li style="justify-content:center; color: var(--muted);">아직 항목이 없어요</li>`
                  }
                </ul>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function render() {
      renderTabs();
      renderPanel();
      bindEvents();
    }

    function addItem(categoryId, ownerId) {
      const input = document.getElementById(`input-${categoryId}-${ownerId}`);
      const text = input.value.trim();
      if (!text) return;

      data[categoryId].push({
        text,
        done: false,
        owner: ownerId
      });

      input.value = "";
      saveData("항목이 추가되었습니다");
      render();
    }

    function toggleItem(categoryId, ownerId, index) {
      const ownerItems = data[categoryId].filter((item) => item.owner === ownerId);
      const target = ownerItems[index];
      if (!target) return;

      target.done = !target.done;
      saveData("상태가 업데이트되었습니다");
      render();
    }

    function removeItem(categoryId, ownerId, index) {
      const ownerItems = data[categoryId].filter((item) => item.owner === ownerId);
      const target = ownerItems[index];
      if (!target) return;

      const originalIndex = data[categoryId].indexOf(target);
      if (originalIndex >= 0) {
        data[categoryId].splice(originalIndex, 1);
      }

      saveData("항목이 삭제되었습니다");
      render();
    }

    function bindEvents() {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];

      owners.forEach((owner) => {
        const input = document.getElementById(`input-${category.id}-${owner.id}`);
        const addButton = categoryPanel.querySelector(`[data-add="${category.id}"][data-owner="${owner.id}"]`);

        if (input) {
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") addItem(category.id, owner.id);
          });
        }

        if (addButton) {
          addButton.addEventListener("click", () => addItem(category.id, owner.id));
        }
      });

      categoryPanel.querySelectorAll("[data-toggle]").forEach((button) => {
        button.addEventListener("click", () => {
          toggleItem(button.dataset.toggle, button.dataset.owner, Number(button.dataset.index));
        });
      });

      categoryPanel.querySelectorAll("[data-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          removeItem(button.dataset.remove, button.dataset.owner, Number(button.dataset.index));
        });
      });
    }

    render();
  </script>
</body>
</html>
