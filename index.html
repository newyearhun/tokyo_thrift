<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    :root {
      color-scheme: light;
      --canvas-light: #ffffff;
      --canvas-cream: #f2f0eb;
      --surface: #ffffff;
      --ink: rgba(0, 0, 0, 0.87);
      --text: rgba(0, 0, 0, 0.87);
      --muted: rgba(0, 0, 0, 0.58);
      --shade-30: #d4d4d8;
      --hairline-light: #e4e4e7;
      --brand-green: #00754a;
      --brand-green-light: #d4e9e2;
      --shadow-card: 0 0 0.5px rgba(0, 0, 0, 0.14), 0 1px 1px rgba(0, 0, 0, 0.24);
      --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.14);
      --radius-sm: 8px;
      --radius-lg: 12px;
      --radius-pill: 9999px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-feature-settings: "ss03";
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter Variable", Inter, "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--canvas-cream);
      color: var(--text);
      padding: 24px;
    }

    .app {
      width: min(100%, 1200px);
      margin: 0 auto;
    }

    .shell {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(228, 228, 231, 0.9);
      border-radius: 20px;
      box-shadow: var(--shadow-float);
      padding: 24px;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tab-btn {
      appearance: none;
      border: 1px solid var(--hairline-light);
      background: var(--canvas-light);
      color: var(--ink);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .tab-btn:hover {
      transform: translateY(-1px);
    }

    .tab-btn.active {
      background: var(--brand-green);
      color: #ffffff;
      border-color: var(--brand-green);
    }

    .category-panel {
      background: var(--surface);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-card);
    }

    .owner-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .owner-panel {
      background: var(--surface);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 14px;
    }

    .owner-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .owner-name {
      margin: 0;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      color: var(--ink);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font: inherit;
      font-size: 16px;
      line-height: 1.5;
      background: var(--canvas-light);
      color: var(--ink);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 0 0 1px rgba(124, 124, 124, 0.06);
    }

    input:focus {
      border-color: var(--brand-green);
      box-shadow: 0 0 0 1px var(--brand-green);
    }

    .add-btn {
      appearance: none;
      border: 0;
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      background: var(--brand-green);
      color: #ffffff;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      background: #1db954;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--canvas-light);
      border: 1px solid var(--hairline-light);
    }

    li.done {
      opacity: 0.65;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .item-text {
      min-width: 0;
      flex: 1;
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink);
      word-break: break-word;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .mini {
      appearance: none;
      border: 0;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.49;
      white-space: nowrap;
      cursor: pointer;
    }

    .check {
      background: var(--brand-green-light);
      color: var(--ink);
    }

    .remove {
      background: #eeeeee;
      color: var(--ink);
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.49;
    }

    .footer strong {
      color: var(--ink);
      font-weight: 550;
    }

    .hint {
      max-width: 70ch;
    }

    @media (max-width: 960px) {
      .owner-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .shell {
        padding: 18px;
        border-radius: 16px;
      }

      .category-panel {
        padding: 18px;
      }

      .input-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <div class="category-tabs" id="categoryTabs"></div>
      <section class="category-panel" id="categoryPanel"></section>
      <div class="footer">
        <div class="hint"><strong>정훈</strong>과 <strong>시현</strong>의 목록은 카테고리별로 따로 저장됩니다.</div>
        <div id="status">준비 완료</div>
      </div>
    </section>
  </main>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const STORAGE_KEY = "shopping-list-items";
    const ACTIVE_CATEGORY_KEY = "shopping-list-active-category";
    const LEGACY_STORAGE_KEY = "shopping-list-categories";
    const SUPABASE_URL = window.__SUPABASE_URL__ || "";
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || "";
    const TABLE_NAME = "shopping_items";
    const REMOTE_ENABLED = Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);

    const owners = [
      { id: "junghun", name: "정훈" },
      { id: "siyeon", name: "시현" }
    ];

    const categories = [
      { id: "food", title: "음식" },
      { id: "cosmetics", title: "화장품" },
      { id: "clothing", title: "의류" },
      { id: "etc", title: "기타" }
    ];

    const categoryTabs = document.getElementById("categoryTabs");
    const categoryPanel = document.getElementById("categoryPanel");
    const status = document.getElementById("status");
    const supabase = REMOTE_ENABLED ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    let items = [];
    let activeCategory = loadActiveCategory();
    let realtimeChannel = null;
    let syncTimer = null;

    function loadActiveCategory() {
      const saved = localStorage.getItem(ACTIVE_CATEGORY_KEY);
      return categories.some((category) => category.id === saved) ? saved : categories[0].id;
    }

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }

      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeItem(item, fallbackCategoryId = "", fallbackOwnerId = "") {
      const categoryId = item.category_id || item.categoryId || fallbackCategoryId;
      const ownerId = item.owner_id || item.ownerId || fallbackOwnerId;

      if (!categoryId || !ownerId || !item.text) {
        return null;
      }

      return {
        id: item.id || makeId(),
        category_id: categoryId,
        owner_id: ownerId,
        text: String(item.text),
        done: Boolean(item.done),
        created_at: item.created_at || new Date().toISOString()
      };
    }

    function normalizeItems(value) {
      if (!Array.isArray(value)) {
        return [];
      }

      return value
        .map((item) => normalizeItem(item, item.category_id, item.owner_id))
        .filter(Boolean);
    }

    function loadLocalItems() {
      try {
        const primary = localStorage.getItem(STORAGE_KEY);
        const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
        const raw = primary || legacy;

        if (!raw) return [];

        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          return normalizeItems(parsed);
        }

        if (parsed && typeof parsed === "object") {
          return Object.entries(parsed).flatMap(([categoryId, categoryItems]) => {
            if (!Array.isArray(categoryItems)) return [];

            return categoryItems
              .map((item) => normalizeItem(item, categoryId, item.owner || item.owner_id))
              .filter(Boolean);
          });
        }
      } catch {
        return [];
      }

      return [];
    }

    function saveLocalItems(nextItems) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nextItems));
    }

    function getCategoryItems(categoryId) {
      return items.filter((item) => item.category_id === categoryId);
    }

    function getOwnerItems(categoryId, ownerId) {
      return items.filter((item) => item.category_id === categoryId && item.owner_id === ownerId);
    }

    function setStatus(message) {
      status.textContent = message;
    }

    function renderTabs() {
      categoryTabs.innerHTML = categories
        .map(
          (category) => `
            <button class="tab-btn ${category.id === activeCategory ? "active" : ""}" data-category="${category.id}">
              ${category.title}
            </button>
          `
        )
        .join("");

      categoryTabs.querySelectorAll("[data-category]").forEach((button) => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          localStorage.setItem(ACTIVE_CATEGORY_KEY, activeCategory);
          setStatus("카테고리가 전환되었습니다");
          render();
        });
      });
    }

    function renderPanel() {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];

      categoryPanel.innerHTML = `
        <div class="owner-grid">
          ${owners
            .map((owner) => {
              const ownerItems = getOwnerItems(category.id, owner.id);

              return `
                <div class="owner-panel">
                  <div class="owner-head">
                    <span class="owner-name">${owner.name}</span>
                  </div>
                  <div class="input-row">
                    <input type="text" id="input-${category.id}-${owner.id}" placeholder="${owner.name} ${category.title} 추가" />
                    <button class="add-btn" data-add="${category.id}" data-owner="${owner.id}">추가</button>
                  </div>
                  <ul id="list-${category.id}-${owner.id}">
                    ${
                      ownerItems.length
                        ? ownerItems
                            .map(
                              (item) => `
                                <li class="${item.done ? "done" : ""}">
                                  <span class="item-text">${escapeHtml(item.text)}</span>
                                  <div class="item-actions">
                                    <button class="mini check" data-toggle="${item.id}">
                                      ${item.done ? "취소" : "완료"}
                                    </button>
                                    <button class="mini remove" data-remove="${item.id}">
                                      삭제
                                    </button>
                                  </div>
                                </li>
                              `
                            )
                            .join("")
                        : `<li style="justify-content:center; color: var(--muted);">아직 항목이 없어요</li>`
                    }
                  </ul>
                </div>
              `;
            })
            .join("")}
        </div>
      `;
    }

    function render() {
      renderTabs();
      renderPanel();
      bindEvents();
    }

    function loadFromStorageAsFallback() {
      items = loadLocalItems();
      render();
    }

    async function refreshFromSupabase() {
      if (!REMOTE_ENABLED) {
        loadFromStorageAsFallback();
        return;
      }

      const { data, error } = await supabase
        .from(TABLE_NAME)
        .select("id, category_id, owner_id, text, done, created_at")
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        setStatus("Supabase 불러오기 실패");
        loadFromStorageAsFallback();
        return;
      }

      items = normalizeItems(data);
      render();
      setStatus("동기화됨");
    }

    async function addItem(categoryId, ownerId) {
      const input = document.getElementById(`input-${categoryId}-${ownerId}`);
      const text = input.value.trim();

      if (!text) return;

      if (REMOTE_ENABLED) {
        const newItem = {
          id: makeId(),
          category_id: categoryId,
          owner_id: ownerId,
          text,
          done: false
        };

        const { error } = await supabase.from(TABLE_NAME).insert(newItem);

        if (error) {
          console.error(error);
          setStatus("추가 실패");
          return;
        }

        input.value = "";
        await refreshFromSupabase();
        return;
      }

      items = [
        ...items,
        {
          id: makeId(),
          category_id: categoryId,
          owner_id: ownerId,
          text,
          done: false,
          created_at: new Date().toISOString()
        }
      ];

      saveLocalItems(items);
      input.value = "";
      setStatus("항목이 추가되었습니다");
      render();
    }

    async function toggleItem(itemId) {
      const currentItem = items.find((item) => item.id === itemId);
      if (!currentItem) return;

      if (REMOTE_ENABLED) {
        const { error } = await supabase
          .from(TABLE_NAME)
          .update({ done: !currentItem.done })
          .eq("id", itemId);

        if (error) {
          console.error(error);
          setStatus("상태 변경 실패");
          return;
        }

        await refreshFromSupabase();
        return;
      }

      items = items.map((item) => (item.id === itemId ? { ...item, done: !item.done } : item));
      saveLocalItems(items);
      setStatus("상태가 업데이트되었습니다");
      render();
    }

    async function removeItem(itemId) {
      const currentItem = items.find((item) => item.id === itemId);
      if (!currentItem) return;

      if (REMOTE_ENABLED) {
        const { error } = await supabase.from(TABLE_NAME).delete().eq("id", itemId);

        if (error) {
          console.error(error);
          setStatus("삭제 실패");
          return;
        }

        await refreshFromSupabase();
        return;
      }

      items = items.filter((item) => item.id !== itemId);
      saveLocalItems(items);
      setStatus("항목이 삭제되었습니다");
      render();
    }

    function bindEvents() {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];

      owners.forEach((owner) => {
        const input = document.getElementById(`input-${category.id}-${owner.id}`);
        const addButton = categoryPanel.querySelector(`[data-add="${category.id}"][data-owner="${owner.id}"]`);

        if (input) {
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              void addItem(category.id, owner.id);
            }
          });
        }

        if (addButton) {
          addButton.addEventListener("click", () => {
            void addItem(category.id, owner.id);
          });
        }
      });

      categoryPanel.querySelectorAll("[data-toggle]").forEach((button) => {
        button.addEventListener("click", () => {
          void toggleItem(button.dataset.toggle);
        });
      });

      categoryPanel.querySelectorAll("[data-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          void removeItem(button.dataset.remove);
        });
      });
    }

    function startRealtime() {
      if (!REMOTE_ENABLED) return;

      realtimeChannel = supabase
        .channel("shopping-items-changes")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: TABLE_NAME },
          () => {
            void refreshFromSupabase();
          }
        )
        .subscribe((state, err) => {
          if (state === "SUBSCRIBED") {
            setStatus("Supabase 연결됨");
          }

          if (state === "CHANNEL_ERROR" || state === "TIMED_OUT") {
            console.error(state, err);
          }
        });

      syncTimer = window.setInterval(() => {
        void refreshFromSupabase();
      }, 5000);
    }

    async function init() {
      if (REMOTE_ENABLED) {
        await refreshFromSupabase();
        startRealtime();
      } else {
        loadFromStorageAsFallback();
        setStatus("로컬 저장 중");
      }
    }

    window.addEventListener("beforeunload", () => {
      if (realtimeChannel) {
        supabase.removeChannel(realtimeChannel);
      }

      if (syncTimer) {
        window.clearInterval(syncTimer);
      }
    });

    init();
  </script>
</body>
</html>
