<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    :root {
      color-scheme: light;
      --canvas-light: #ffffff;
      --canvas-cream: #f2f0eb;
      --surface: #ffffff;
      --ink: rgba(0, 0, 0, 0.87);
      --text: rgba(0, 0, 0, 0.87);
      --muted: rgba(0, 0, 0, 0.58);
      --shade-30: #d4d4d8;
      --hairline-light: #e4e4e7;
      --brand-green: #00754a;
      --brand-green-light: #d4e9e2;
      --shadow-card: 0 0 0.5px rgba(0, 0, 0, 0.14), 0 1px 1px rgba(0, 0, 0, 0.24);
      --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.14);
      --radius-sm: 8px;
      --radius-lg: 12px;
      --radius-pill: 9999px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-feature-settings: "ss03";
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter Variable", Inter, "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--canvas-cream);
      color: var(--text);
      padding: 18px;
    }

    .app {
      width: min(100%, 1200px);
      margin: 0 auto;
    }

    .shell {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(228, 228, 231, 0.9);
      border-radius: 20px;
      box-shadow: var(--shadow-float);
      padding: 18px;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tab-btn {
      appearance: none;
      border: 1px solid var(--hairline-light);
      background: var(--canvas-light);
      color: var(--ink);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .tab-btn:hover {
      transform: translateY(-1px);
    }

    .tab-btn.active {
      background: var(--brand-green);
      color: #ffffff;
      border-color: var(--brand-green);
    }

    .category-panel {
      background: var(--surface);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-card);
    }

    .owner-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .owner-panel {
      background: var(--surface);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 12px;
    }

    .owner-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .owner-name {
      margin: 0;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      color: var(--ink);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .meta-row[hidden] {
      display: none;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
      background: var(--canvas-light);
      color: var(--ink);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 0 0 1px rgba(124, 124, 124, 0.06);
    }

    input:focus {
      border-color: var(--brand-green);
      box-shadow: 0 0 0 1px var(--brand-green);
    }

    .add-btn {
      appearance: none;
      border: 0;
      padding: 9px 14px;
      border-radius: var(--radius-pill);
      background: var(--brand-green);
      color: #ffffff;
      font-size: 13px;
      font-weight: 550;
      line-height: 1.5;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      background: #1db954;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: #d4e8de;
      border: 1px solid rgba(0, 117, 74, 0.4);
      box-shadow: none;
    }

    li.done {
      opacity: 0.65;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    li.done .item-body {
      opacity: 0.7;
    }

    .item-text {
      display: block;
      width: 100%;
      min-width: 0;
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink);
      word-break: break-word;
      text-align: left;
    }

    .text-card .item-link {
      color: var(--ink);
      text-decoration: underline;
      word-break: break-all;
    }

    .text-card .item-link:hover {
      color: #111111;
    }

    .link-card {
      display: block;
      border: 1px solid rgba(0, 0, 0, 0.7);
      border-radius: 14px;
      background: #fffaf0;
      padding: 10px 12px;
      color: inherit;
      text-decoration: none;
      box-shadow: none;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .link-card:hover {
      transform: translateY(-1px);
      background: #f7edd8;
      border-color: rgba(0, 0, 0, 0.9);
    }

    .link-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
      min-width: 0;
    }

    .link-card-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 9999px;
      background: var(--brand-green);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .link-card-domain {
      min-width: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-body {
      min-width: 0;
      flex: 1;
      display: grid;
      gap: 8px;
    }

    .item-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .text-card {
      min-width: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      background: #fcfcf9;
      padding: 4px 12px;
      font-size: 13px;
      line-height: 1.4;
      color: rgba(0, 0, 0, 0.92);
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      text-align: left;
    }

    .item-note {
      margin: 0;
      min-width: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      background: #fcfcf9;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(0, 0, 0, 0.92);
      overflow-wrap: anywhere;
      min-height: 56px;
      white-space: pre-wrap;
    }

    .item-actions {
      position: relative;
      flex-shrink: 0;
      width: 42px;
    }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(4px);
    }

    .dialog-panel {
      width: min(100%, 560px);
      border-radius: 18px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: #ffffff;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .dialog-title {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      line-height: 1.3;
      color: var(--ink);
    }

    .dialog-textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid rgba(0, 0, 0, 0.14);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
      color: rgba(0, 0, 0, 0.92);
      background: #fcfcf9;
      outline: none;
    }

    .dialog-textarea:focus {
      border-color: var(--brand-green);
      box-shadow: 0 0 0 1px var(--brand-green);
    }

    .dialog-hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .dialog-btn {
      appearance: none;
      border: 0;
      border-radius: var(--radius-pill);
      padding: 9px 14px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      cursor: pointer;
    }

    .dialog-cancel {
      background: #f2f2f2;
      color: var(--ink);
    }

    .dialog-save {
      background: var(--brand-green);
      color: #fff;
    }

    .menu-trigger {
      appearance: none;
      border: 1px solid rgba(0, 0, 0, 0.1);
      padding: 0;
      width: 42px;
      height: 42px;
      border-radius: var(--radius-pill);
      background: #f6f4ef;
      color: var(--ink);
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      list-style: none;
      box-shadow: var(--shadow-card);
    }

    .menu-trigger::-webkit-details-marker {
      display: none;
    }

    .item-menu {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      z-index: 2;
      min-width: 120px;
      padding: 8px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.14);
      gap: 6px;
    }

    .item-actions[open] .item-menu {
      display: grid;
    }

    .mini {
      appearance: none;
      border: 0;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.49;
      white-space: nowrap;
      cursor: pointer;
      width: 100%;
    }

    .check {
      background: var(--brand-green-light);
      color: var(--ink);
    }

    .edit {
      background: #f4ede4;
      color: var(--ink);
    }

    .note-edit {
      background: #eaf3ef;
      color: var(--ink);
    }

    .remove {
      background: #eeeeee;
      color: var(--ink);
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.49;
    }

    .footer strong {
      color: var(--ink);
      font-weight: 550;
    }

    .hint {
      max-width: 70ch;
    }

    @media (max-width: 960px) {
      .owner-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .shell {
        padding: 10px;
        border-radius: 14px;
      }

      .category-panel {
        padding: 10px;
      }

      .input-row {
        flex-direction: column;
      }

      input {
        font-size: 16px;
      }

      .owner-panel {
        padding: 10px;
      }

      li {
        flex-direction: row;
        align-items: flex-start;
        gap: 8px;
        padding: 12px 10px;
      }

      .item-body {
        width: auto;
        flex: 1 1 auto;
        gap: 4px;
      }

      .item-main {
        gap: 2px;
      }

      .text-card {
        padding: 2px 10px;
        font-size: 12px;
        line-height: 1.15;
        border-radius: 8px;
      }

      .link-card {
        padding: 7px 10px;
        border-radius: 12px;
      }

      .link-card-top {
        gap: 6px;
        margin-bottom: 0;
      }

      .link-card-badge {
        padding: 2px 7px;
        font-size: 11px;
      }

      .link-card-domain {
        font-size: 13px;
      }

      .plain-item {
        padding-top: 3px;
        padding-bottom: 3px;
      }

      .plain-item .item-body {
        gap: 1px;
      }

      .plain-item .item-main {
        gap: 0;
      }

      .plain-item .text-card {
        padding: 5px;
        font-size: 11px;
        line-height: 1;
        min-height: 0;
        border-radius: 8px;
      }

      .plain-item .item-text {
        line-height: 1;
      }

      .dialog-backdrop {
        padding: 10px;
      }

      .dialog-panel {
        padding: 14px;
        gap: 10px;
        border-radius: 16px;
      }

      .dialog-title {
        font-size: 16px;
      }

      .dialog-textarea {
        min-height: 150px;
        font-size: 16px;
      }

      .item-actions {
        width: 42px;
        min-width: 0;
        margin-left: auto;
        align-self: flex-start;
      }

      .menu-trigger {
        width: 36px;
        height: 36px;
        font-size: 20px;
      }

      .item-menu {
        right: 0;
        left: auto;
      }

    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <div class="category-tabs" id="categoryTabs"></div>
      <section class="category-panel" id="categoryPanel"></section>
      <div class="footer">
        <div class="hint"><strong>정훈</strong>과 <strong>시현</strong>의 목록은 카테고리별로 따로 저장됩니다.</div>
        <div id="status">준비 완료</div>
      </div>
    </section>
  </main>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const STORAGE_KEY = "shopping-list-items";
    const ACTIVE_CATEGORY_KEY = "shopping-list-active-category";
    const LEGACY_STORAGE_KEY = "shopping-list-categories";
    const SUPABASE_URL = window.__SUPABASE_URL__ || "";
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || "";
    const TABLE_NAME = "shopping_items";
    const REMOTE_ENABLED = Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);

    const owners = [
      { id: "junghun", name: "정훈" },
      { id: "siyeon", name: "시현" }
    ];

    const categories = [
      { id: "food", title: "음식" },
      { id: "cosmetics", title: "화장품" },
      { id: "clothing", title: "의류" },
      { id: "etc", title: "기타" }
    ];

    const categoryTabs = document.getElementById("categoryTabs");
    const categoryPanel = document.getElementById("categoryPanel");
    const status = document.getElementById("status");
    const supabase = REMOTE_ENABLED ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    let items = [];
    let activeCategory = loadActiveCategory();
    let realtimeChannel = null;
    let syncTimer = null;

    function loadActiveCategory() {
      const saved = localStorage.getItem(ACTIVE_CATEGORY_KEY);
      return categories.some((category) => category.id === saved) ? saved : categories[0].id;
    }

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }

      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function linkifyHtml(text) {
      const source = String(text);
      const urlPattern = /(https?:\/\/[^\s<]+|www\.[^\s<]+)/gi;
      let result = "";
      let lastIndex = 0;

      for (const match of source.matchAll(urlPattern)) {
        const raw = match[0];
        const index = match.index ?? 0;

        result += escapeHtml(source.slice(lastIndex, index));

        let href = raw;
        let display = raw;
        let trailing = "";

        while (/[),.!?;:]$/.test(display)) {
          trailing = display.slice(-1) + trailing;
          display = display.slice(0, -1);
        }

        if (display.startsWith("www.")) {
          href = `https://${display}`;
        } else {
          href = display;
        }

        result += `<a class="item-link" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(display)}</a>${escapeHtml(trailing)}`;
        lastIndex = index + raw.length;
      }

      result += escapeHtml(source.slice(lastIndex));
      return result;
    }

    function trimTrailingPunctuation(value) {
      let text = String(value).trim();

      while (/[),.!?;:]$/.test(text)) {
        text = text.slice(0, -1);
      }

      return text;
    }

    function extractSingleUrl(text) {
      const source = String(text).trim();
      const matched = source.match(/^(https?:\/\/[^\s<]+|www\.[^\s<]+)$/i);
      if (!matched) {
        return null;
      }

      const cleaned = trimTrailingPunctuation(matched[1]);
      const href = cleaned.startsWith("www.") ? `https://${cleaned}` : cleaned;

      try {
        return new URL(href);
      } catch {
        return null;
      }
    }

    function openMultilineEditor({ title, value, hint, saveLabel = "저장" }) {
      return new Promise((resolve) => {
        const previousOverflow = document.body.style.overflow;
        const backdrop = document.createElement("div");
        backdrop.className = "dialog-backdrop";
        backdrop.innerHTML = `
          <div class="dialog-panel" role="dialog" aria-modal="true" aria-label="${escapeHtml(title)}">
            <h2 class="dialog-title">${escapeHtml(title)}</h2>
            <textarea class="dialog-textarea" spellcheck="false"></textarea>
            <p class="dialog-hint">${escapeHtml(hint)}</p>
            <div class="dialog-actions">
              <button class="dialog-btn dialog-cancel" type="button">취소</button>
              <button class="dialog-btn dialog-save" type="button">${escapeHtml(saveLabel)}</button>
            </div>
          </div>
        `;

        document.body.appendChild(backdrop);
        document.body.style.overflow = "hidden";

        const textarea = backdrop.querySelector("textarea");
        const cancelButton = backdrop.querySelector(".dialog-cancel");
        const saveButton = backdrop.querySelector(".dialog-save");
        const panel = backdrop.querySelector(".dialog-panel");
        let settled = false;

        textarea.value = value || "";
        textarea.focus();
        textarea.setSelectionRange(textarea.value.length, textarea.value.length);

        function close(result) {
          if (settled) return;
          settled = true;
          document.body.style.overflow = previousOverflow;
          backdrop.remove();
          resolve(result);
        }

        cancelButton.addEventListener("click", () => close(null));
        saveButton.addEventListener("click", () => close(textarea.value));

        backdrop.addEventListener("click", (event) => {
          if (event.target === backdrop) {
            close(null);
          }
        });

        panel.addEventListener("click", (event) => {
          event.stopPropagation();
        });

        textarea.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            event.preventDefault();
            close(null);
            return;
          }

          if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
            event.preventDefault();
            close(textarea.value);
          }
        });
      });
    }

    function renderItemContent(text) {
      return renderShoppingItem({
        text,
        note: ""
      });
    }

    function renderShoppingItem(item) {
      const text = String(item.text);
      const note = String(item.note || "").trim();
      const url = extractSingleUrl(text);
      const noteMarkup = note ? `<div class="item-note">${escapeHtml(note)}</div>` : "";

      if (url) {
        const domain = url.hostname.replace(/^www\./, "");
        const label = domain.includes("google.com") && url.pathname.includes("/maps") ? "map" : "link";

        return `
          <div class="item-body">
            <a class="link-card" href="${escapeHtml(url.toString())}" target="_blank" rel="noopener noreferrer">
              <div class="link-card-top">
                <span class="link-card-badge">${escapeHtml(label)}</span>
                <span class="link-card-domain">${escapeHtml(domain)}</span>
              </div>
            </a>
            ${noteMarkup}
          </div>
        `;
      }

      return `
        <div class="item-body">
          <div class="item-main">
            <div class="text-card">
              <span class="item-text">${linkifyHtml(text)}</span>
            </div>
          </div>
        </div>
      `;
    }

    function normalizeItem(item, fallbackCategoryId = "", fallbackOwnerId = "") {
      const categoryId = item.category_id || item.categoryId || fallbackCategoryId;
      const ownerId = item.owner_id || item.ownerId || fallbackOwnerId;
      const isLink = Boolean(extractSingleUrl(item.text || ""));

      if (!categoryId || !ownerId || !item.text) {
        return null;
      }

      return {
        id: item.id || makeId(),
        category_id: categoryId,
        owner_id: ownerId,
        text: String(item.text),
        note: isLink ? String(item.note ?? "") : "",
        done: Boolean(item.done),
        created_at: item.created_at || new Date().toISOString()
      };
    }

    function normalizeItems(value) {
      if (!Array.isArray(value)) {
        return [];
      }

      return value
        .map((item) => normalizeItem(item, item.category_id, item.owner_id))
        .filter(Boolean);
    }

    function loadLocalItems() {
      try {
        const primary = localStorage.getItem(STORAGE_KEY);
        const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
        const raw = primary || legacy;

        if (!raw) return [];

        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          return normalizeItems(parsed);
        }

        if (parsed && typeof parsed === "object") {
          return Object.entries(parsed).flatMap(([categoryId, categoryItems]) => {
            if (!Array.isArray(categoryItems)) return [];

            return categoryItems
              .map((item) => normalizeItem(item, categoryId, item.owner || item.owner_id))
              .filter(Boolean);
          });
        }
      } catch {
        return [];
      }

      return [];
    }

    function saveLocalItems(nextItems) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nextItems));
    }

    function getCategoryItems(categoryId) {
      return items.filter((item) => item.category_id === categoryId);
    }

    function getOwnerItems(categoryId, ownerId) {
      return items.filter((item) => item.category_id === categoryId && item.owner_id === ownerId);
    }

    function setStatus(message) {
      status.textContent = message;
    }

    function renderTabs() {
      categoryTabs.innerHTML = categories
        .map(
          (category) => `
            <button class="tab-btn ${category.id === activeCategory ? "active" : ""}" data-category="${category.id}">
              ${category.title}
            </button>
          `
        )
        .join("");

      categoryTabs.querySelectorAll("[data-category]").forEach((button) => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          localStorage.setItem(ACTIVE_CATEGORY_KEY, activeCategory);
          setStatus("카테고리가 전환되었습니다");
          render();
        });
      });
    }

    function renderPanel(draftState = null) {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];

      categoryPanel.innerHTML = `
        <div class="owner-grid">
          ${owners
            .map((owner) => {
              const ownerItems = getOwnerItems(category.id, owner.id);

              return `
                <div class="owner-panel">
                  <div class="owner-head">
                    <span class="owner-name">${owner.name}</span>
                  </div>
                  <div class="input-row">
                    <input type="text" id="input-${category.id}-${owner.id}" placeholder="${owner.name} ${category.title} 추가" />
                    <button class="add-btn" type="button" data-add="${category.id}" data-owner="${owner.id}">추가</button>
                  </div>
                  <div class="meta-row" id="note-row-${category.id}-${owner.id}" ${extractSingleUrl(draftState?.drafts?.[`input-${category.id}-${owner.id}`] || "") ? "" : "hidden"}>
                    <input type="text" id="note-${category.id}-${owner.id}" placeholder="링크 메모(선택)" />
                  </div>
                  <ul id="list-${category.id}-${owner.id}">
                    ${
                      ownerItems.length
                        ? ownerItems
                            .map(
                              (item) => `
                              <li class="${item.done ? "done" : ""} ${extractSingleUrl(item.text || "") ? "link-item" : "plain-item"}">
                                  ${renderShoppingItem(item)}
                                  <details class="item-actions">
                                    <summary class="menu-trigger" aria-label="항목 메뉴 열기" aria-haspopup="menu">⋯</summary>
                                    <div class="item-menu" role="menu">
                                      <button class="mini check" type="button" data-toggle="${item.id}">
                                        ${item.done ? "취소" : "완료"}
                                      </button>
                                      ${extractSingleUrl(item.text || "") ? `<button class="mini note-edit" type="button" data-edit-note="${item.id}">메모 수정</button>` : ""}
                                      <button class="mini edit" type="button" data-edit="${item.id}">
                                        수정
                                      </button>
                                      <button class="mini remove" type="button" data-remove="${item.id}">
                                        삭제
                                      </button>
                                    </div>
                                  </details>
                                </li>
                              `
                            )
                            .join("")
                        : `<li style="justify-content:center; color: var(--muted);">아직 항목이 없어요</li>`
                    }
                  </ul>
                </div>
              `;
            })
            .join("")}
        </div>
      `;
    }

    function captureDraftState() {
      const drafts = {};
      categoryPanel.querySelectorAll("input[type='text']").forEach((element) => {
        if (element.id) {
          drafts[element.id] = element.value;
        }
      });

      const activeElement = document.activeElement;
      const activeDraft = activeElement && activeElement.id ? {
        id: activeElement.id,
        start: typeof activeElement.selectionStart === "number" ? activeElement.selectionStart : null,
        end: typeof activeElement.selectionEnd === "number" ? activeElement.selectionEnd : null
      } : null;

      return { drafts, activeDraft };
    }

    function restoreDraftState(state) {
      if (!state) return;

      Object.entries(state.drafts || {}).forEach(([id, value]) => {
        const element = document.getElementById(id);
        if (element && element.value !== value) {
          element.value = value;
        }
      });

      if (state.activeDraft) {
        const element = document.getElementById(state.activeDraft.id);
        if (element && typeof element.focus === "function") {
          element.focus({ preventScroll: true });
          if (state.activeDraft.start !== null && state.activeDraft.end !== null && typeof element.setSelectionRange === "function") {
            element.setSelectionRange(state.activeDraft.start, state.activeDraft.end);
          }
        }
      }
    }

    function isEditingDraft() {
      const activeElement = document.activeElement;
      return Boolean(
        activeElement &&
        categoryPanel.contains(activeElement) &&
        (activeElement.tagName === "INPUT" || activeElement.tagName === "TEXTAREA")
      );
    }

    function render() {
      const draftState = captureDraftState();
      renderTabs();
      renderPanel(draftState);
      bindEvents();
      restoreDraftState(draftState);
      syncLinkNoteVisibility();
    }

    function loadFromStorageAsFallback() {
      items = loadLocalItems();
      render();
    }

    async function fetchSupabaseRows() {
      const primaryQuery = supabase
        .from(TABLE_NAME)
        .select("id, category_id, owner_id, text, note, done, created_at")
        .order("created_at", { ascending: true });

      const primaryResult = await primaryQuery;
      if (!primaryResult.error) {
        return primaryResult;
      }

      const fallbackQuery = supabase
        .from(TABLE_NAME)
        .select("id, category_id, owner_id, text, note, done, created_at")
        .order("created_at", { ascending: true });

      const fallbackResult = await fallbackQuery;
      if (fallbackResult.error) {
        fallbackResult.error.message = `${primaryResult.error.message} | ${fallbackResult.error.message}`;
      }

      return fallbackResult;
    }

    async function refreshFromSupabase(options = {}) {
      const { forceRender = false } = options;
      if (!REMOTE_ENABLED) {
        loadFromStorageAsFallback();
        return;
      }

      const { data, error } = await fetchSupabaseRows();

      if (error) {
        console.error(error);
        setStatus("Supabase load failed");
        loadFromStorageAsFallback();
        return;
      }

      items = normalizeItems(data);
      if (!forceRender && isEditingDraft()) {
        setStatus("Synced");
        return;
      }

      render();
      setStatus("Synced");
    }

    async function toggleItem(itemId) {
      const currentItem = items.find((item) => item.id === itemId);
      if (!currentItem) return;

      if (REMOTE_ENABLED) {
        const { error } = await supabase
          .from(TABLE_NAME)
          .update({ done: !currentItem.done })
          .eq("id", itemId);

        if (error) {
          console.error(error);
          setStatus("Status update failed");
          return;
        }

        await refreshFromSupabase({ forceRender: true });
        return;
      }

      items = items.map((item) => (item.id === itemId ? { ...item, done: !item.done } : item));
      saveLocalItems(items);
      setStatus("Status updated");
      render();
    }

    async function addShoppingItem(categoryId, ownerId) {
      const input = document.getElementById(`input-${categoryId}-${ownerId}`);
      const noteInput = document.getElementById(`note-${categoryId}-${ownerId}`);
      const text = input ? input.value.trim() : "";
      const note = extractSingleUrl(text) && noteInput ? noteInput.value.trim() : "";

      if (!text) return;

      const nextItem = {
        category_id: categoryId,
        owner_id: ownerId,
        text,
        note,
        done: false
      };

      if (REMOTE_ENABLED) {
        const { error } = await supabase.from(TABLE_NAME).insert(nextItem);

        if (error) {
          console.error(error);
          setStatus("Add failed");
          return;
        }

        if (input) input.value = "";
        if (noteInput) noteInput.value = "";
        await refreshFromSupabase({ forceRender: true });
        return;
      }

      items = [
        ...items,
        {
          id: makeId(),
          category_id: categoryId,
          owner_id: ownerId,
          text,
          note,
          done: false,
          created_at: new Date().toISOString()
        }
      ];

      saveLocalItems(items);
      if (input) input.value = "";
      if (noteInput) noteInput.value = "";
      setStatus("Item added");
      render();
    }

    async function removeShoppingItem(itemId) {
      const currentItem = items.find((item) => item.id === itemId);
      if (!currentItem) return;

      if (REMOTE_ENABLED) {
        const { error } = await supabase.from(TABLE_NAME).delete().eq("id", itemId);

        if (error) {
          console.error(error);
          setStatus("Delete failed");
          return;
        }

        await refreshFromSupabase({ forceRender: true });
        return;
      }

      items = items.filter((item) => item.id !== itemId);
      saveLocalItems(items);
      setStatus("Item deleted");
      render();
    }

    async function editShoppingItem(itemId) {
      const currentItem = items.find((item) => item.id === itemId);
      if (!currentItem) return;

      const nextText = await openMultilineEditor({
        title: "수정할 내용을 입력하세요",
        value: currentItem.text || "",
        hint: "줄바꿈은 Enter, 저장은 Ctrl+Enter 또는 저장 버튼으로 할 수 있어요."
      });
      if (nextText === null) return;

      const text = nextText.trim();
      const isLink = Boolean(extractSingleUrl(text));
      let note = "";

      if (isLink) {
        const nextNote = await openMultilineEditor({
          title: "링크 메모를 수정하세요",
          value: currentItem.note || "",
          hint: "줄바꿈은 Enter, 저장은 Ctrl+Enter 또는 저장 버튼으로 할 수 있어요."
        });
        if (nextNote === null) return;
        note = nextNote.trimEnd();
      }

      if (!text) return;

      if (REMOTE_ENABLED) {
        const { error } = await supabase
          .from(TABLE_NAME)
          .update({ text, note })
          .eq("id", itemId);

        if (error) {
          console.error(error);
          setStatus("Edit failed");
          return;
        }

        await refreshFromSupabase({ forceRender: true });
        return;
      }

      items = items.map((item) => (
        item.id === itemId
          ? { ...item, text, note }
          : item
      ));

      saveLocalItems(items);
      setStatus("Item updated");
      render();
    }

    async function editShoppingItemNote(itemId) {
      const currentItem = items.find((item) => item.id === itemId);
      if (!currentItem) return;

      if (!extractSingleUrl(currentItem.text || "")) return;

      const nextNote = await openMultilineEditor({
        title: "링크 메모를 수정하세요",
        value: currentItem.note || "",
        hint: "줄바꿈은 Enter로 넣고, 저장은 Ctrl+Enter 또는 저장 버튼으로 해주세요."
      });
      if (nextNote === null) return;

      const note = nextNote.trimEnd();

      if (REMOTE_ENABLED) {
        const { error } = await supabase
          .from(TABLE_NAME)
          .update({ note })
          .eq("id", itemId);

        if (error) {
          console.error(error);
          setStatus("Note update failed");
          return;
        }

        await refreshFromSupabase({ forceRender: true });
        return;
      }

      items = items.map((item) => (
        item.id === itemId
          ? { ...item, note }
          : item
      ));

      saveLocalItems(items);
      setStatus("Note updated");
      render();
    }

    function bindEvents() {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];

      owners.forEach((owner) => {
        const input = document.getElementById(`input-${category.id}-${owner.id}`);
        const noteInput = document.getElementById(`note-${category.id}-${owner.id}`);
        const noteRow = document.getElementById(`note-row-${category.id}-${owner.id}`);
        const addButton = categoryPanel.querySelector(`[data-add="${category.id}"][data-owner="${owner.id}"]`);

        if (input) {
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              void addShoppingItem(category.id, owner.id);
            }
          });

          input.addEventListener("input", () => {
            syncLinkNoteVisibility();
          });
        }

        if (noteInput) {
          noteInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              void addShoppingItem(category.id, owner.id);
            }
          });
        }

        if (addButton) {
          addButton.addEventListener("click", () => {
            void addShoppingItem(category.id, owner.id);
          });
        }

        if (noteRow) {
          noteRow.hidden = !extractSingleUrl(input ? input.value : "");
        }
      });

      if (!bindEvents.delegatedClicksBound) {
        categoryPanel.addEventListener("click", (event) => {
          const toggleButton = event.target.closest("[data-toggle]");
          if (toggleButton && categoryPanel.contains(toggleButton)) {
            void toggleItem(toggleButton.dataset.toggle);
            return;
          }

          const editButton = event.target.closest("[data-edit]");
          if (editButton && categoryPanel.contains(editButton)) {
            void editShoppingItem(editButton.dataset.edit);
            return;
          }

          const noteEditButton = event.target.closest("[data-edit-note]");
          if (noteEditButton && categoryPanel.contains(noteEditButton)) {
            void editShoppingItemNote(noteEditButton.dataset.editNote);
            return;
          }

          const removeButton = event.target.closest("[data-remove]");
          if (removeButton && categoryPanel.contains(removeButton)) {
            void removeShoppingItem(removeButton.dataset.remove);
          }
        });

        bindEvents.delegatedClicksBound = true;
      }

      if (!bindEvents.outsideMenuBound) {
        document.addEventListener("click", (event) => {
          if (event.target.closest(".item-actions")) return;
          document.querySelectorAll(".item-actions[open]").forEach((menu) => {
            menu.removeAttribute("open");
          });
        });

        bindEvents.outsideMenuBound = true;
      }
    }

    function syncLinkNoteVisibility() {
      const category = categories.find((item) => item.id === activeCategory) || categories[0];

      owners.forEach((owner) => {
        const input = document.getElementById(`input-${category.id}-${owner.id}`);
        const noteRow = document.getElementById(`note-row-${category.id}-${owner.id}`);

        if (!noteRow) return;

        noteRow.hidden = !extractSingleUrl(input ? input.value : "");
      });
    }

    function startRealtime() {
      if (!REMOTE_ENABLED) return;

      realtimeChannel = supabase
        .channel("shopping-items-changes")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: TABLE_NAME },
          () => {
            void refreshFromSupabase();
          }
        )
        .subscribe((state, err) => {
          if (state === "SUBSCRIBED") {
            setStatus("Supabase connected");
          }

          if (state === "CHANNEL_ERROR" || state === "TIMED_OUT") {
            console.error(state, err);
          }
        });

      syncTimer = window.setInterval(() => {
        void refreshFromSupabase();
      }, 5000);
    }

    async function init() {
      if (REMOTE_ENABLED) {
        await refreshFromSupabase({ forceRender: true });
        startRealtime();
      } else {
        loadFromStorageAsFallback();
        setStatus("Local mode");
      }
    }

    window.addEventListener("beforeunload", () => {
      if (realtimeChannel) {
        supabase.removeChannel(realtimeChannel);
      }

      if (syncTimer) {
        window.clearInterval(syncTimer);
      }
    });

    init();
  </script>
</body>
</html>
