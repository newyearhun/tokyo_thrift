<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    :root {
      color-scheme: light;
      --canvas-light: #ffffff;
      --canvas-cream: #fbfbf5;
      --surface: #ffffff;
      --surface-soft: #f6f7f1;
      --ink: #000000;
      --text: #111111;
      --muted: #52525b;
      --shade-30: #d4d4d8;
      --shade-40: #a1a1aa;
      --hairline-light: #e4e4e7;
      --aloe-10: #c1fbd4;
      --pistachio-10: #d4f9e0;
      --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.06), 0 5px 10px rgba(0, 0, 0, 0.08);
      --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.14);
      --radius-sm: 8px;
      --radius-lg: 12px;
      --radius-pill: 9999px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-feature-settings: "ss03";
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter Variable", Inter, "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(196, 251, 212, 0.75) 0%, transparent 26%),
        radial-gradient(circle at bottom right, rgba(212, 249, 224, 0.8) 0%, transparent 30%),
        linear-gradient(180deg, var(--canvas-cream) 0%, #ffffff 100%);
      color: var(--text);
      padding: 24px;
    }

    .app {
      width: min(100%, 1200px);
      margin: 0 auto;
    }

    .shell {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(228, 228, 231, 0.95);
      border-radius: 20px;
      box-shadow: var(--shadow-float);
      padding: 24px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--hairline-light);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: var(--aloe-10);
      color: var(--ink);
      font-size: 12px;
      letter-spacing: 0.72px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-family: "Neue Haas Grotesk Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: clamp(2.8rem, 5vw, 4.4rem);
      font-weight: 330;
      line-height: 1;
      letter-spacing: 0;
      color: var(--ink);
    }

    .sub {
      margin: 10px 0 0;
      font-size: 16px;
      line-height: 1.5;
      color: var(--muted);
      max-width: 58ch;
    }

    .hero-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      min-width: 180px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      background: #000000;
      color: #ffffff;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      letter-spacing: 0;
      box-shadow: var(--shadow-card);
    }

    .small-note {
      font-size: 14px;
      color: var(--muted);
      text-align: right;
      line-height: 1.49;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .category {
      background: var(--surface);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-card);
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .category h2 {
      margin: 0;
      font-family: "Neue Haas Grotesk Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 28px;
      font-weight: 500;
      line-height: 1.28;
      letter-spacing: 0.42px;
      color: var(--ink);
    }

    .category p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.49;
    }

    .category-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: var(--pistachio-10);
      color: var(--ink);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.72px;
      text-transform: capitalize;
      white-space: nowrap;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .owner-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .owner-panel {
      background: var(--canvas-cream);
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-lg);
      padding: 14px;
    }

    .owner-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .owner-name {
      margin: 0;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      color: var(--ink);
    }

    .owner-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: var(--aloe-10);
      color: var(--ink);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.72px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--hairline-light);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font: inherit;
      font-size: 16px;
      line-height: 1.5;
      background: var(--canvas-light);
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: #000000;
      box-shadow: 0 0 0 1px #000000;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .add-btn {
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      background: #000000;
      color: #ffffff;
      font-size: 14px;
      font-weight: 550;
      line-height: 1.5;
      white-space: nowrap;
      box-shadow: var(--shadow-card);
    }

    .add-btn:hover {
      transform: translateY(-1px);
      background: #3f3f46;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--canvas-light);
      border: 1px solid var(--hairline-light);
    }

    li.done {
      opacity: 0.65;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .item-text {
      min-width: 0;
      flex: 1;
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink);
      word-break: break-word;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .mini {
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.49;
      white-space: nowrap;
    }

    .check {
      background: var(--aloe-10);
      color: var(--ink);
    }

    .remove {
      background: var(--shade-30);
      color: var(--ink);
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.49;
    }

    .footer strong {
      color: var(--ink);
      font-weight: 550;
    }

    .hint {
      max-width: 70ch;
    }

    @media (max-width: 960px) {
      .grid,
      .owner-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .shell {
        padding: 18px;
        border-radius: 16px;
      }

      .hero {
        flex-direction: column;
      }

      .hero-meta {
        align-items: flex-start;
        min-width: 0;
      }

      .small-note {
        text-align: left;
      }

      .category {
        padding: 18px;
      }

      .input-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <header class="hero">
        <div>
          <div class="eyebrow">Transactional track</div>
          <h1>쇼핑 리스트</h1>
          <p class="sub">정훈과 시현의 항목을 음식, 화장품, 의류, 기타로 나눠서 한 화면에서 함께 볼 수 있어요.</p>
        </div>
        <div class="hero-meta">
          <div class="badge">Shopifi style</div>
          <div class="small-note">깔끔한 컬러 대비와 pill 버튼 중심의 심플한 거래형 화면</div>
        </div>
      </header>

      <section class="grid" id="grid"></section>

      <div class="footer">
        <div class="hint"><strong>정훈</strong>과 <strong>시현</strong>의 목록은 각 카테고리 안에서 분리되어 저장됩니다.</div>
        <div id="status">준비 완료</div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "shopping-list-categories";
    const owners = [
      { id: "junghun", name: "정훈" },
      { id: "siyeon", name: "시현" }
    ];
    const categories = [
      { id: "food", title: "음식", description: "장보기, 식재료, 간식" },
      { id: "cosmetics", title: "화장품", description: "스킨케어, 메이크업, 위생용품" },
      { id: "clothing", title: "의류", description: "상의, 하의, 신발, 액세서리" },
      { id: "etc", title: "기타", description: "그 외 필요한 물건" }
    ];

    const grid = document.getElementById("grid");
    const status = document.getElementById("status");
    const defaultData = Object.fromEntries(categories.map((category) => [category.id, []]));

    function cloneDefaultData() {
      return JSON.parse(JSON.stringify(defaultData));
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return cloneDefaultData();
        const parsed = JSON.parse(raw);
        return { ...cloneDefaultData(), ...parsed };
      } catch {
        return cloneDefaultData();
      }
    }

    let data = loadData();

    function saveData(message = "저장됨") {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      status.textContent = message;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function groupedItems(items, ownerId) {
      return items.filter((item) => item.owner === ownerId);
    }

    function render() {
      grid.innerHTML = "";

      categories.forEach((category) => {
        const items = data[category.id] || [];

        const section = document.createElement("section");
        section.className = "category";
        section.innerHTML = `
          <div class="category-head">
            <div>
              <h2>${category.title}</h2>
              <p>${category.description}</p>
            </div>
            <span class="category-chip">category</span>
          </div>
          <div class="owner-grid">
            ${owners.map((owner) => {
              const ownerItems = groupedItems(items, owner.id);
              return `
                <div class="owner-panel">
                  <div class="owner-head">
                    <span class="owner-pill">${owner.name}</span>
                    <span class="owner-name">${owner.name}</span>
                  </div>
                  <div class="input-row">
                    <input type="text" id="input-${category.id}-${owner.id}" placeholder="${owner.name} ${category.title} 추가" />
                    <button class="add-btn" data-add="${category.id}" data-owner="${owner.id}">추가</button>
                  </div>
                  <ul id="list-${category.id}-${owner.id}">
                    ${
                      ownerItems.length
                        ? ownerItems.map((item, index) => `
                            <li class="${item.done ? "done" : ""}">
                              <span class="item-text">${escapeHtml(item.text)}</span>
                              <div class="item-actions">
                                <button class="mini check" data-toggle="${category.id}" data-owner="${owner.id}" data-index="${index}">
                                  ${item.done ? "취소" : "완료"}
                                </button>
                                <button class="mini remove" data-remove="${category.id}" data-owner="${owner.id}" data-index="${index}">
                                  삭제
                                </button>
                              </div>
                            </li>
                          `).join("")
                        : `<li style="justify-content:center; color: var(--muted);">아직 항목이 없어요</li>`
                    }
                  </ul>
                </div>
              `;
            }).join("")}
          </div>
        `;

        grid.appendChild(section);
      });

      bindEvents();
    }

    function addItem(categoryId, ownerId) {
      const input = document.getElementById(`input-${categoryId}-${ownerId}`);
      const text = input.value.trim();
      if (!text) return;

      data[categoryId].push({
        text,
        done: false,
        owner: ownerId
      });

      input.value = "";
      saveData("항목이 추가되었습니다");
      render();
    }

    function toggleItem(categoryId, ownerId, index) {
      const ownerItems = data[categoryId].filter((item) => item.owner === ownerId);
      const target = ownerItems[index];
      if (!target) return;

      target.done = !target.done;
      saveData("상태가 업데이트되었습니다");
      render();
    }

    function removeItem(categoryId, ownerId, index) {
      const ownerItems = data[categoryId].filter((item) => item.owner === ownerId);
      const target = ownerItems[index];
      if (!target) return;

      const originalIndex = data[categoryId].indexOf(target);
      if (originalIndex >= 0) {
        data[categoryId].splice(originalIndex, 1);
      }

      saveData("항목이 삭제되었습니다");
      render();
    }

    function bindEvents() {
      categories.forEach((category) => {
        owners.forEach((owner) => {
          const input = document.getElementById(`input-${category.id}-${owner.id}`);
          const addButton = grid.querySelector(`[data-add="${category.id}"][data-owner="${owner.id}"]`);

          if (input) {
            input.addEventListener("keydown", (event) => {
              if (event.key === "Enter") addItem(category.id, owner.id);
            });
          }

          if (addButton) {
            addButton.addEventListener("click", () => addItem(category.id, owner.id));
          }
        });
      });

      grid.querySelectorAll("[data-toggle]").forEach((button) => {
        button.addEventListener("click", () => {
          toggleItem(button.dataset.toggle, button.dataset.owner, Number(button.dataset.index));
        });
      });

      grid.querySelectorAll("[data-remove]").forEach((button) => {
        button.addEventListener("click", () => {
          removeItem(button.dataset.remove, button.dataset.owner, Number(button.dataset.index));
        });
      });
    }

    render();
  </script>
</body>
</html>
